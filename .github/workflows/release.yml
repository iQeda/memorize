name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Apply local patches against vendor/anki
        run: bash ./scripts/apply-vendor-patches.sh

      - name: Install protoc
        run: brew install protobuf

      - name: Read pinned Rust toolchain
        id: rust
        run: |
          # vendor/anki/rust-toolchain.toml pins the version we must use.
          VERSION=$(awk -F'"' '/channel/ {print $2}' vendor/anki/rust-toolchain.toml)
          echo "version=${VERSION:-stable}" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        # Pinned to stable tag to avoid moving target on @master
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust.outputs.version }}
          targets: aarch64-apple-darwin

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            vendor/anki

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute release tag and title
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date -u +%Y%m%d-%H%M)
          SHA=$(git rev-parse --short HEAD)
          TAG="v${VERSION}-${DATE}-${SHA}"
          TITLE="Memorize v${VERSION} (main @ ${SHA}, ${DATE} UTC)"
          {
            echo "tag=${TAG}"
            echo "title=${TITLE}"
            echo "version=${VERSION}"
            echo "sha=${SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Build app and publish release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — leave secrets unset to skip latest.json/.sig
          # generation. When set, tauri-action attaches signed update
          # artifacts so the in-app updater can verify them.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: ${{ steps.meta.outputs.title }}
          releaseBody: |
            Automated build from `main` @ ${{ github.sha }}.

            **Apple Silicon (aarch64) only.** Unsigned — first launch requires
            right-click → Open → Open to bypass Gatekeeper.

            See [README](https://github.com/${{ github.repository }}#readme) for setup.

            ---

            ### Source code (AGPL-3.0-or-later §6 corresponding source)

            This binary is built from
            <https://github.com/${{ github.repository }}/tree/${{ github.sha }}>.
            memorize is licensed under
            [AGPL-3.0-or-later](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/LICENSE);
            it bundles a modified copy of [`rslib`](https://github.com/ankitects/anki/tree/main/rslib)
            from Ankitects Pty Ltd. Local modifications are documented in
            [`patches/`](https://github.com/${{ github.repository }}/tree/${{ github.sha }}/patches)
            and [`NOTICE`](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/NOTICE).

            memorize is an unofficial third-party client; it is not affiliated
            with, endorsed by, or sponsored by Ankitects Pty Ltd.
          prerelease: true
          args: --target aarch64-apple-darwin

      - name: Verify bundle signature
        # We don't sign with a real Developer ID. Tauri (with
        # bundle.macOS.signingIdentity = "-") ad-hoc signs the assembled
        # bundle so it satisfies its Designated Requirement structurally.
        #
        # Without this end-to-end signature, the app launches as
        # "damaged" on other Macs even if quarantine is stripped — kernel
        # exec on Apple Silicon refuses bundles whose signature claims
        # resources that aren't covered. Catch any regression in this
        # path before users see "damaged" dialogs.
        run: |
          set -euo pipefail
          # tauri-action runs with --target aarch64-apple-darwin, so the
          # bundle lands under target/aarch64-apple-darwin/release/... not
          # target/release/... Use a glob to stay robust if the target
          # triple ever changes.
          BUNDLE=$(find src-tauri/target -type d -path '*/release/bundle/macos/Memorize.app' | head -n1)
          if [ -z "$BUNDLE" ] || [ ! -d "$BUNDLE" ]; then
            echo "::error::expected app bundle not found under src-tauri/target"
            find src-tauri/target -maxdepth 5 -name '*.app' || true
            exit 1
          fi
          codesign -dvvv "$BUNDLE" 2>&1 | tee /tmp/codesign.log
          if ! grep -q "Signature=adhoc" /tmp/codesign.log; then
            echo "::error title=signature regression::expected an ad-hoc signature on the app bundle; got something else (see codesign output)."
            exit 1
          fi
          # Strict structural verification — catches the
          # "code has no resources but signature indicates they must be
          # present" failure mode where the binary was signed but the
          # surrounding bundle never re-sealed.
          if ! codesign --verify --deep --strict --verbose=2 "$BUNDLE" 2>&1 | tee /tmp/codesign-verify.log; then
            echo "::error title=bundle integrity::codesign --verify --deep --strict failed; the app would launch as 'damaged' on user machines."
            exit 1
          fi
          echo "::notice::ad-hoc signature + bundle integrity OK"

      - name: Mark release as Latest
        # tauri-action publishes with prerelease=true, so GitHub will not
        # promote the new release to "Latest" automatically — and the
        # in-app updater hits /releases/latest/download/latest.json, which
        # only resolves against the Latest release. Flip the flag here so
        # every signed build becomes the canonical update target.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: gh release edit "$TAG" --latest --prerelease=false --repo "${{ github.repository }}"

      - name: Bump cask in iQeda/homebrew-tap
        # Only attempts the bump when a PAT secret is configured. Without
        # the secret the step prints a warning and exits 0 — useful so
        # forks / contributors don't see a failed CI on missing secrets.
        if: success()
        env:
          GH_PAT: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          PKG_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${GH_PAT:-}" ]; then
            echo "::warning title=cask bump skipped::HOMEBREW_TAP_TOKEN secret not set; skipping homebrew-tap update."
            exit 0
          fi

          DMG=$(find src-tauri/target -type f -path "*/release/bundle/dmg/Memorize_${PKG_VERSION}_aarch64.dmg" | head -n1)
          if [ -z "$DMG" ] || [ ! -f "$DMG" ]; then
            echo "::error::expected DMG not found: Memorize_${PKG_VERSION}_aarch64.dmg"
            find src-tauri/target -maxdepth 6 -name '*.dmg' || true
            exit 1
          fi
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          CASK_VERSION="${TAG#v}"
          echo "Bumping cask to version=${CASK_VERSION}, sha=${SHA:0:12}…"

          TAP_DIR=$(mktemp -d)
          git clone --depth 1 \
            "https://x-access-token:${GH_PAT}@github.com/iQeda/homebrew-tap.git" \
            "$TAP_DIR"
          cd "$TAP_DIR"

          # BSD sed (-i with backup suffix) — works on macOS-latest runner.
          # The DMG file name changed from `memorize_*` to `Memorize_*` when
          # productName was capitalized; the [Mm] alternation lets the
          # regex match either pre-rename or post-rename URLs in the cask.
          sed -i.bak \
            -e "s/^  version \".*\"$/  version \"${CASK_VERSION}\"/" \
            -e "s/^  sha256 \".*\"$/  sha256 \"${SHA}\"/" \
            -e "s/[Mm]emorize_[^_]*_aarch64\.dmg/Memorize_${PKG_VERSION}_aarch64.dmg/" \
            Casks/memorize.rb
          rm -f Casks/memorize.rb.bak

          if git diff --quiet -- Casks/memorize.rb; then
            echo "Cask already up to date; nothing to commit."
            exit 0
          fi

          git config user.email "actions@iqeda.dev"
          git config user.name "memorize release bot"
          git commit -am "memorize: bump to ${TAG}

          Source: https://github.com/iQeda/memorize/releases/tag/${TAG}
          SHA-256: ${SHA}
          "
          git push origin HEAD:main
